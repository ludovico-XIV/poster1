<script>
(function() {
  "use strict";

  var ondeGroup = document.getElementById('onde-group');
  var mouseSpot = document.querySelector('#mouseSpot');
  var svgEl = document.querySelector('#layer-1 svg');

  // --- Fade in ---
  function fadeIn(el, delay, duration) {
    duration = duration || 1400;
    setTimeout(function() {
      if (typeof anime !== 'undefined') {
        anime({ targets: el, opacity: [0, 1], duration: duration, easing: 'easeOutCubic' });
      } else {
        el.style.opacity = '1';
        el.style.transition = 'opacity ' + (duration/1000) + 's ease-out';
      }
    }, delay);
  }

  fadeIn(ondeGroup, 200, 1600);
  fadeIn(document.querySelector('#layer-2'), 1000);
  fadeIn(document.querySelector('#layer-3'), 2000);

  // --- Mouse tracking for red overlay + black text overlay ---
  var mouseSpot2 = document.querySelector('#mouseSpot2');
  var mouseSpot3 = document.querySelector('#mouseSpot3');

  if (svgEl) {
    function onMove(e) {
      var r = svgEl.getBoundingClientRect();
      var nx = (e.clientX - r.left) / r.width;
      var ny = (e.clientY - r.top) / r.height;
      nx = Math.min(1, Math.max(0, nx));
      ny = Math.min(1, Math.max(0, ny));
      var cx = (7985 + nx * 340).toFixed(1);
      var cy = (7986 + ny * 398).toFixed(1);
      if (mouseSpot) { mouseSpot.setAttribute('cx', cx); mouseSpot.setAttribute('cy', cy); }
      if (mouseSpot2) { mouseSpot2.setAttribute('cx', cx); mouseSpot2.setAttribute('cy', cy); }
      if (mouseSpot3) { mouseSpot3.setAttribute('cx', cx); mouseSpot3.setAttribute('cy', cy); }
    }
    document.addEventListener('mousemove', onMove);
  }

})();
</script>
